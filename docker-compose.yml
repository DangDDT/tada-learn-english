services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://tada:tada@db:5432/tada_english?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-tada-learn-english-secret-change-in-production}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - tada-network
      - npm_default

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=tada
      - POSTGRES_PASSWORD=${DB_PASSWORD:-tada}
      - POSTGRES_DB=tada_english
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tada"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - tada-network

volumes:
  pgdata:

networks:
  tada-network:
    driver: bridge
  npm_default:
    external: true
