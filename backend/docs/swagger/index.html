<body><div id="swagger-ui"></div>
<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js" crossorigin></script>
<script>
window.onload=()=>{window.ui=SwaggerUIBundle({spec:{openapi:"3.0.3",info:{title:"Tada Learn English API",version:"1.0.0",description:"Backend API for Tada Learn English - vocabulary learning with Spaced Repetition System (SRS)"},servers:[{url:"https://tada-english.dangddt.io.vn",description:"Production"}],tags:[{name:"Health",description:"Health check"},{name:"Auth",description:"Authentication & user management"},{name:"Words",description:"Vocabulary CRUD & import"}],paths:{"/api/v1/health":{get:{tags:["Health"],summary:"Health check",operationId:"healthCheck",responses:{"200":{description:"OK",content:{"application/json":{schema:{$ref:"#/components/schemas/HealthResponse"}}}}}}},"/api/v1/auth/register":{post:{tags:["Auth"],summary:"Register new user",operationId:"register",requestBody:{required:true,content:{"application/json":{schema:{$ref:"#/components/schemas/RegisterRequest"}}}},responses:{"201":{description:"User created"},"409":{description:"Email already exists"}}}},"/api/v1/auth/login":{post:{tags:["Auth"],summary:"Login",operationId:"login",requestBody:{required:true,content:{"application/json":{schema:{$ref:"#/components/schemas/LoginRequest"}}}},responses:{"200":{description:"JWT tokens",content:{"application/json":{schema:{$ref:"#/components/schemas/TokenResponse"}}}},"401":{description:"Invalid credentials"}}}},"/api/v1/auth/refresh":{post:{tags:["Auth"],summary:"Refresh JWT token",operationId:"refreshToken",requestBody:{required:true,content:{"application/json":{schema:{type:"object",properties:{refresh_token:{type:"string"}},required:["refresh_token"]}}}},responses:{"200":{description:"New tokens",content:{"application/json":{schema:{$ref:"#/components/schemas/TokenResponse"}}}},"401":{description:"Invalid refresh token"}}}},"/api/v1/auth/forgot-password":{post:{tags:["Auth"],summary:"Request password reset",operationId:"forgotPassword",requestBody:{required:true,content:{"application/json":{schema:{type:"object",properties:{email:{type:"string",format:"email"}},required:["email"]}}}},responses:{"200":{description:"Reset email sent"}}}},"/api/v1/auth/reset-password":{post:{tags:["Auth"],summary:"Reset password with token",operationId:"resetPassword",requestBody:{required:true,content:{"application/json":{schema:{type:"object",properties:{token:{type:"string"},new_password:{type:"string",minLength:8}},required:["token","new_password"]}}}},responses:{"200":{description:"Password updated"},"400":{description:"Invalid token"}}}},"/api/v1/words":{get:{tags:["Words"],summary:"List user's words",operationId:"listWords",security:[{bearerAuth:[]}],parameters:[{name:"page",in:"query",schema:{type:"integer",default:1}},{name:"limit",in:"query",schema:{type:"integer",default:20}},{name:"cefr_level",in:"query",schema:{type:"string",enum:["A1","A2","B1","B2","C1","C2"]}}],responses:{"200":{description:"Paginated word list"},"401":{description:"Unauthorized"}}},post:{tags:["Words"],summary:"Create new word",operationId:"createWord",security:[{bearerAuth:[]}],requestBody:{required:true,content:{"application/json":{schema:{$ref:"#/components/schemas/CreateWordRequest"}}}},responses:{"201":{description:"Word created"},"401":{description:"Unauthorized"}}}},"/api/v1/words/{id}":{get:{tags:["Words"],summary:"Get word by ID",operationId:"getWord",security:[{bearerAuth:[]}],parameters:[{name:"id",in:"path",required:true,schema:{type:"string",format:"uuid"}}],responses:{"200":{description:"Word detail"},"401":{description:"Unauthorized"},"404":{description:"Not found"}}},put:{tags:["Words"],summary:"Update word",operationId:"updateWord",security:[{bearerAuth:[]}],parameters:[{name:"id",in:"path",required:true,schema:{type:"string",format:"uuid"}}],requestBody:{required:true,content:{"application/json":{schema:{$ref:"#/components/schemas/CreateWordRequest"}}}},responses:{"200":{description:"Word updated"},"401":{description:"Unauthorized"},"404":{description:"Not found"}}},delete:{tags:["Words"],summary:"Delete word",operationId:"deleteWord",security:[{bearerAuth:[]}],parameters:[{name:"id",in:"path",required:true,schema:{type:"string",format:"uuid"}}],responses:{"204":{description:"Deleted"},"401":{description:"Unauthorized"},"404":{description:"Not found"}}}},"/api/v1/words/import":{post:{tags:["Words"],summary:"Import words in batch",operationId:"importWords",security:[{bearerAuth:[]}],requestBody:{required:true,content:{"application/json":{schema:{type:"object",properties:{words:{type:"array",items:{$ref:"#/components/schemas/CreateWordRequest"}}},required:["words"]}}}},responses:{"201":{description:"Words imported"},"401":{description:"Unauthorized"}}}}},components:{securitySchemes:{bearerAuth:{type:"http",scheme:"bearer",bearerFormat:"JWT"}},schemas:{HealthResponse:{type:"object",properties:{status:{type:"string",example:"ok"},version:{type:"string",example:"1.0.0"},db:{type:"string",example:"connected"}}},RegisterRequest:{type:"object",required:["email","password","name"],properties:{email:{type:"string",format:"email",example:"user@example.com"},password:{type:"string",minLength:8,example:"securePass123"},name:{type:"string",example:"Tâm Đăng"}}},LoginRequest:{type:"object",required:["email","password"],properties:{email:{type:"string",format:"email"},password:{type:"string"}}},TokenResponse:{type:"object",properties:{access_token:{type:"string"},refresh_token:{type:"string"},expires_in:{type:"integer",example:3600}}},CreateWordRequest:{type:"object",required:["word","meaning"],properties:{word:{type:"string",example:"ephemeral"},pronunciation:{type:"string",example:"ih-FEM-uh-rul"},ipa:{type:"string",example:"/ɪˈfem.ər.əl/"},meaning:{type:"string",example:"Lasting for a very short time"},part_of_speech:{type:"string",example:"adjective"},cefr_level:{type:"string",enum:["A1","A2","B1","B2","C1","C2"],example:"C1"},example_sentences:{type:"array",items:{type:"string"},example:["The beauty of cherry blossoms is ephemeral."]},tags:{type:"array",items:{type:"string"},example:["advanced","literature"]}}}}}},dom_id:"#swagger-ui",deepLinking:true,presets:[SwaggerUIBundle.presets.apis,SwaggerUIBundle.SwaggerUIStandalonePreset]})};
</script>
